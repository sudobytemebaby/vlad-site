<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&family=Onest:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
		%sveltekit.head%
	</head>
	<body class="bg-background text-foreground antialiased selection:bg-primary selection:text-white">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			// Prevent flash of incorrect theme
			try {
				const theme = localStorage.getItem('theme') || 'light';
				if (theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
					document.documentElement.classList.add('dark');
				} else {
					document.documentElement.classList.remove('dark');
				}
			} catch (_) {}
		</script>
	</body>
</html>
